<!DOCTYPE html>
<html lang="es" data-lang="es">
<head>
  <!-- Mismo head que acerca.html -->
  <title data-i18n="title.spots">Spots | Callejeando</title>
</head>
<body class="page-body">
  <!-- Mismo topbar y mobile menu que acerca.html -->
  
<!--  -->



<!--  -->



  <!-- Hero específico para Spots -->
  <header class="legal-hero">
    <div class="hero-media">
      <img class="hero-image" src="../images/homepage/spots.webp" alt="Mapa de spots de skate" />
    </div>
    <div class="hero-overlay"></div>
    <div class="legal-hero-inner">
      <div class="legal-kicker" data-i18n="header.spots">🛹 Callejeando / Spots</div>
      <h1 class="legal-title" data-i18n="h2.spots">Spots & Skateparks</h1>
      <div class="about-chips">
        <span class="about-chip"><i class="fa-solid fa-map-location-dot"></i> <span data-i18n="spots.map">Mapa Interactivo</span></span>
        <span class="about-chip"><i class="fa-solid fa-list"></i> <span data-i18n="spots.list">Lista Completa</span></span>
        <span class="about-chip"><i class="fa-solid fa-location-dot"></i> <span data-i18n="spots.add">Agregar Spot</span></span>
      </div>
    </div>
  </header>

  <!-- Contenido específico de Spots -->
  <main class="legal-page">
    <div class="legal-container">
      <section class="legal-card">
        <!-- Aquí va el contenido específico usando los componentes del CSS -->
        <div class="spots-grid">
          <div class="spot-card">
            <img src="../images/spots/spot1.jpg" alt="Spot 1" class="spot-image">
            <div class="spot-info">
              <h3>El Banco de la Curva</h3>
              <p>San José, Costa Rica</p>
              <div class="spot-tags">
                <span class="spot-tag">Ledge</span>
                <span class="spot-tag">Street</span>
              </div>
              <a href="#" class="about-cta-btn secondary">Ver Detalles</a>
            </div>
          </div>
          <!-- Más spot cards... -->
        </div>
        
        <!-- CTA al final -->
        <div class="about-cta">
          <div class="about-cta-text">
            <h3 data-i18n="spots.cta.title">¿Conocés un spot que no está?</h3>
            <p data-i18n="spots.cta.subtitle">Ayudá a la comunidad agregándolo al mapa</p>
          </div>
          <div class="about-cta-actions">
            <a class="about-cta-btn" href="contacto.html?subject=nuevo-spot" data-i18n="spots.cta.button">Reportar Spot</a>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Mismo footer que acerca.html (con la corrección del logo) -->
</body>
</html>
